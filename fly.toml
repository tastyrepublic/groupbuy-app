# fly.toml app configuration file generated for groupbuy-app on 2026-03-12T15:40:55Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'groupbuy-app'
primary_region = 'sin'

[build]

[deploy]
  release_command = 'npx prisma migrate deploy'

[env]
  PORT = '3000'
  SCOPES = 'read_checkouts,read_customers,read_orders,read_payment_customizations,read_publications,unauthenticated_read_checkouts,unauthenticated_read_product_listings,unauthenticated_write_checkouts,write_app_proxy,write_checkouts,write_order_edits,write_orders,write_payment_customizations,write_products,write_publications'
  SHOPIFY_API_KEY = '64f33a0c73521f54219f6883774470fa'
  SHOPIFY_APP_URL = 'https://groupbuy-app.fly.dev'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
