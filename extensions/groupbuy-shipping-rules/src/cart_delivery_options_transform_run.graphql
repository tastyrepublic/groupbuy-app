query RunInput {
  deliveryCustomization {
    metafield(namespace: "$app:groupbuy", key: "hidden_rates") {
      value
    }
  }
  cart {
    lines {
      sellingPlanAllocation {
        sellingPlan { id }
      }
    }
    deliveryGroups {
      deliveryOptions {
        handle
        title
        deliveryMethodType
        cost { amount }
      }
    }
  }
}