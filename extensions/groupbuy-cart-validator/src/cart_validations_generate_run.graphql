query RunInput {
  cart {
    lines {
      # ✨ NEW: Fetch the hidden Campaign ID property!
      attribute(key: "_groupbuy_campaign_id") {
        value
      }
      sellingPlanAllocation {
        sellingPlan {
          id
        }
      }
    }
  }
  localization {
    language {
      isoCode
    }
  }
}